<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-6">
                <input type="text" id="nameInput" class="form-control" placeholder="Nhập họ tên">
                <input type="number" id="scoreInput" class="form-control mt-3" placeholder="Nhập điểm số">
                <button onclick="luuDuLieu()" id="btnSave" class="btn btn-primary mt-3 rounded-3">Thêm</button>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm theo tên...">
            </div>
            <div class="col-md-6">
                <select id="rankFilter" class="form-select">
                    <option value="Tất cả">Tất cả xếp loại</option>
                    <option value="Giỏi">Giỏi</option>
                    <option value="Khá">Khá</option>
                    <option value="Trung bình">Trung bình</option>
                    <option value="Yếu">Yếu</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <table class="table mt-3 table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Họ tên</th>
                            <th id="scoreHeader" style="cursor: pointer;" title="Nhấn để sắp xếp">
                                Điểm <span id="sortIcon"></span>
                            </th>
                            <th>Xếp loại</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
