<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-step Form với jQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-text { font-size: 0.875em; display: block; min-height: 20px; color: #dc3545; }
        /* Ẩn mặc định Bước 2 và Bước 3 */
        #step2, #step3 { display: none; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-3">Đăng Ký Tài Khoản</h3>
                        
                        <div class="progress mb-4" style="height: 25px;">
                            <div id="progressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" role="progressbar" style="width: 33%;">Bước 1 / 3</div>
                        </div>

                        <form id="multiStepForm" novalidate>
                            
                            <div id="step1" class="form-step">
                                <h5 class="mb-3 text-primary">Bước 1: Thông tin cá nhân</h5>
                                
                                <div class="mb-3">
                                    <label class="form-label">Họ và tên</label>
                                    <input type="text" class="form-control" id="fullname" placeholder="Nhập họ và tên">
                                    <span class="error-text" id="fullname-error"></span>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Ngày sinh</label>
                                    <input type="date" class="form-control" id="dob">
                                    <span class="error-text" id="dob-error"></span>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label d-block">Giới tính</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender" value="Nam" id="genderMale">
                                        <label class="form-check-label" for="genderMale">Nam</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender" value="Nữ" id="genderFemale">
                                        <label class="form-check-label" for="genderFemale">Nữ</label>
                                    </div>
                                    <span class="error-text" id="gender-error"></span>
                                </div>

                                <div class="text-end">
                                    <button type="button" class="btn btn-primary btn-next">Tiếp theo ➡</button>
                                </div>
                            </div>

                            <div id="step2" class="form-step">
                                <h5 class="mb-3 text-primary">Bước 2: Thông tin tài khoản</h5>
                                
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" placeholder="name@domain.com">
                                    <span class="error-text" id="email-error"></span>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Mật khẩu</label>
                                    <input type="password" class="form-control" id="password" placeholder="Tối thiểu 8 ký tự">
                                    <span class="error-text" id="password-error"></span>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Xác nhận mật khẩu</label>
                                    <input type="password" class="form-control" id="confirm_password">
                                    <span class="error-text" id="confirm_password-error"></span>
                                </div>

                                <div class="d-flex justify-content-between">
                                    <button type="button" class="btn btn-secondary btn-back">⬅ Quay lại</button>
                                    <button type="button" class="btn btn-primary btn-next">Tiếp theo ➡</button>
                                </div>
                            </div>

                            <div id="step3" class="form-step">
                                <h5 class="mb-3 text-primary">Bước 3: Xác nhận thông tin</h5>
                                
                                <div class="bg-light border p-3 rounded mb-3">
                                    <p><strong>Họ tên:</strong> <span id="sum_fullname"></span></p>
                                    <p><strong>Ngày sinh:</strong> <span id="sum_dob"></span></p>
                                    <p><strong>Giới tính:</strong> <span id="sum_gender"></span></p>
                                    <p class="mb-0"><strong>Email:</strong> <span id="sum_email"></span></p>
                                </div>

                                <div class="d-flex justify-content-between">
                                    <button type="button" class="btn btn-secondary btn-back">⬅ Quay lại sửa</button>
                                    <button type="submit" class="btn btn-success">Hoàn tất Đăng ký ✔</button>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
