<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đặt Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-text { font-size: 0.875em; display: block; min-height: 20px; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                
                <div class="card shadow-sm" id="formContainer">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Thông Tin Đặt Hàng</h3>
                        <form id="orderForm" novalidate>
                            
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label for="product" class="form-label">Tên sản phẩm</label>
                                    <select class="form-select" id="product">
                                        <option value="">-- Chọn sản phẩm --</option>
                                        <option value="ao_thun">Áo thun cotton</option>
                                        <option value="quan_jean">Quần Jean nam</option>
                                        <option value="giay_the_thao">Giày thể thao</option>
                                    </select>
                                    <span class="text-danger error-text" id="product-error"></span>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label for="quantity" class="form-label">Số lượng</label>
                                    <input type="number" class="form-control" id="quantity" min="1" max="99" value="1">
                                    <span class="text-danger error-text" id="quantity-error"></span>
                                </div>
                            </div>

                            <div class="mb-3 p-3 bg-light rounded border border-info">
                                <strong>Tổng tiền dự kiến: </strong>
                                <span id="totalPriceDisplay" class="text-danger fw-bold fs-5">0 VNĐ</span>
                            </div>

                            <div class="mb-3">
                                <label for="delivery_date" class="form-label">Ngày giao hàng mong muốn</label>
                                <input type="date" class="form-control" id="delivery_date">
                                <span class="text-danger error-text" id="delivery_date-error"></span>
                            </div>

                            <div class="mb-3">
                                <label for="address" class="form-label">Địa chỉ giao hàng</label>
                                <input type="text" class="form-control" id="address" placeholder="Nhập địa chỉ chi tiết (nhà, đường, phường/xã...)">
                                <span class="text-danger error-text" id="address-error"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Phương thức thanh toán</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="payment" id="payCOD" value="COD">
                                    <label class="form-check-label" for="payCOD">Thanh toán khi nhận hàng (COD)</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="payment" id="payBank" value="Chuyển khoản">
                                    <label class="form-check-label" for="payBank">Chuyển khoản</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="payment" id="payWallet" value="Ví điện tử">
                                    <label class="form-check-label" for="payWallet">Ví điện tử</label>
                                </div>
                                <span class="text-danger error-text" id="payment-error"></span>
                            </div>

                            <div class="mb-3">
                                <label for="notes" class="form-label">Ghi chú thêm</label>
                                <textarea class="form-control" id="notes" rows="3" placeholder="Không bắt buộc"></textarea>
                                <div class="d-flex justify-content-between">
                                    <span class="text-danger error-text" id="notes-error"></span>
                                    <span id="charCount" class="text-muted small mt-1">0/200</span>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 rounded-3">Tiến hành đặt hàng</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm d-none border-warning" id="confirmContainer">
                    <div class="card-body p-4 text-center">
                        <h4 class="card-title text-warning mb-3">Xác nhận đơn hàng</h4>
                        <div class="text-start mb-4 bg-light p-3 rounded">
                            <p><strong>Sản phẩm:</strong> <span id="confProduct"></span></p>
                            <p><strong>Số lượng:</strong> <span id="confQty"></span></p>
                            <p><strong>Ngày giao:</strong> <span id="confDate"></span></p>
                            <p class="mb-0 text-danger fs-5"><strong>Tổng thanh toán:</strong> <span id="confTotal"></span></p>
                        </div>
                        <button id="btnCancel" class="btn btn-secondary px-4 me-2">Quay lại sửa</button>
                        <button id="btnConfirm" class="btn btn-success px-4">Xác nhận đặt hàng</button>
                    </div>
                </div>

                <div class="alert alert-success d-none text-center shadow-sm" id="successMessage">
                    <h4 class="alert-heading mt-2">🎉 Đặt hàng thành công!</h4>
                    <p>Cảm ơn bạn đã mua sắm. Đơn hàng sẽ được giao đến địa chỉ của bạn.</p>
                </div>

            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
