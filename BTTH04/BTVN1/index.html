<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-text { font-size: 0.875em; display: block; min-height: 20px; }
        /* Tùy chỉnh nhỏ để nút con mắt nhìn đẹp hơn khi focus */
        .input-group-text-btn { cursor: pointer; border-color: #ced4da; background-color: white; }
        .input-group-text-btn:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div id="successMessage" class="alert alert-success d-none text-center">
                    <h4 class="alert-heading">Đăng ký thành công! 🎉</h4>
                    <p>Chào mừng bạn, <strong id="registeredName"></strong>.</p>
                </div>

                <div class="card shadow-sm" id="formContainer">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Đăng Ký Tài Khoản</h3>
                        <form id="registerForm" novalidate>
                            
                            <div class="mb-3">
                                <label for="fullname" class="form-label">Họ và tên</label>
                                <input type="text" class="form-control" id="fullname" placeholder="Nguyễn Văn A" maxlength="50">
                                <div class="d-flex justify-content-between">
                                    <span class="text-danger error-text" id="fullname-error"></span>
                                    <span id="nameCharCount" class="text-muted small mt-1">0/50</span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="name@domain.com">
                                <span class="text-danger error-text" id="email-error"></span>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label">Số điện thoại</label>
                                <input type="text" class="form-control" id="phone" placeholder="09xxxxxxx">
                                <span class="text-danger error-text" id="phone-error"></span>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" placeholder="Bao gồm chữ hoa, chữ thường và số">
                                    <button class="btn input-group-text-btn border" type="button" id="togglePassword" title="Hiện/Ẩn mật khẩu">👁️</button>
                                </div>
                                <div class="progress mt-2" style="height: 5px;">
                                    <div id="passwordStrengthBar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span class="text-danger error-text" id="password-error"></span>
                                    <span id="passwordStrengthText" class="small fw-bold mt-1"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Xác nhận mật khẩu</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="confirm_password">
                                    <button class="btn input-group-text-btn border" type="button" id="toggleConfirmPassword" title="Hiện/Ẩn mật khẩu">👁️</button>
                                </div>
                                <span class="text-danger error-text" id="confirm_password-error"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Giới tính</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="genderMale" value="Nam">
                                    <label class="form-check-label" for="genderMale">Nam</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="Nữ">
                                    <label class="form-check-label" for="genderFemale">Nữ</label>
                                </div>
                                <span class="text-danger error-text" id="gender-error"></span>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="terms">
                                <label class="form-check-label" for="terms">Tôi đồng ý với các điều khoản và dịch vụ</label>
                                <span class="text-danger error-text" id="terms-error"></span>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 rounded-3">Đăng Ký</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
