<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Get in touch with us by filling contact form below</h1>
    <div class="contact-form">
        
    <div class="input-group">
        <input type="text" id="name" name="name" placeholder="* Enter your full name">
        
        <input type="text" id="email" name ="email" placeholder="* Enter your email address">
    </div>
    <div class = "subject-group">
        <input type="text" id="subject" name="subject" placeholder="Enter your subject">
    </div>
        <textarea name="message" id="message" placeholder="* Your message here..."></textarea>
        <div class="footer">
            <button type="submit">Send Message</button>
            <p style="color:dimgray;">* Please fill all required form fields, thanks!</p>
        </div>
    </div>    
</body>
</html>
